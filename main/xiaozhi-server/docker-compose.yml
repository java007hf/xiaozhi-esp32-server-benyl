# Docker安装Server

version: '3'
services:
  xiaozhi-esp32-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: xiaozhi-esp32-server-with-node:local
    container_name: xiaozhi-esp32-server
    restart: always
    command:
      - sh
      - -c
      - |
        printf "%s" "$${FEISHU_APP_SECRET}" | lark-cli config init --app-id "$${FEISHU_APP_ID}" --app-secret-stdin --brand feishu --force-init && python app.py
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
    ports:
      # ws服务端
      - "8000:8000"
      # http服务的端口，用于简单OTA接口(单服务部署)，以及视觉分析接口
      - "8003:8003"
    volumes:
      # 配置文件目录
      - ./data:/opt/xiaozhi-esp32-server/data
      # lark-cli 配置目录，避免容器重建后丢失
      - ./data/.lark-cli:/root/.lark-cli
      # 本地插件和 skills，便于扩展工具能力
      - ./plugins_func:/opt/xiaozhi-esp32-server/plugins_func
      - ./skills:/opt/xiaozhi-esp32-server/skills
      - ./core/providers/skills:/opt/xiaozhi-esp32-server/core/providers/skills
      - ./core/providers/tools/server_plugins:/opt/xiaozhi-esp32-server/core/providers/tools/server_plugins
      # 模型文件挂接，很重要
      - ./models/SenseVoiceSmall/model.pt:/opt/xiaozhi-esp32-server/models/SenseVoiceSmall/model.pt
